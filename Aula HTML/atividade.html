<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    h1{
        font-size: 28px;
        font-family: Arial, Helvetica, sans-serif;
        margin: 40px;
    }
</style>
</head>
<body>
    <h1>Cadastro > Incluir</h1>

    <form action="receber-dados.html" method="POST">
        <label for="nome">Nome Completo</label>
        <input type="text" id="nome" autofocus>
        <label for="sexo">Sexo</label>
        <select id="sexo">
            <option value="">Selecione</option>
            <option value="masculino">Masculino</option>
            <option value="feminino">Feminino</option>
            <br>
        </select>
        
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" required autofocus>
        <br>
        
        <label for="rg">RG</label>
        <input type="text" id="RG">
        <br>

        <label for="nascimento">Nascimento</label>
        <input type="date" id="nascimento">
        <br>

        <label for="ddd">DDD</label>
        <input type="text" id="ddd" required autofocus>
        

        <label for="telefone">Telefone</label>
        <input type="text" id="telefone" required autofocus>
        <br>

        <label for="ddd">DDD</label>
        <input type="text" id="ddd" required autofocus>
        

        <label for="celular">Celular</label>
        <input type="text" id="celular" required autofocus>
        <br>

        <label for="email">Email</label>
        <input type="email" id="email" required autofocus>
        <br>

        <label for="senha">Senha</label>
        <input type="text" id="senha">
        

        <label for="confirme">Confirme</label>
        <input type="text" id="confirme">
        <br>

        <label for="cep">CEP</label>
        <input type="text" id="cep" required autofocus>

        <label for="endereço">Endereço</label>
        <input type="text" id="endereço" required autofocus>
        <br>

        <label for="número">Número</label>
        <input type="text" id="número" required autofocus>

        <label for="bairro">Bairro</label>
        <input type="text" id="bairro" required autofocus>
        
        <label for="complemento">Complemento</label>
        <input type="text" id="complemento">

        <label for="cidade">Cidade</label>
        <input type="text" id="cidade" required autofocus>

        <label for="estado">Estado</label required autofocus>
        <select id="estado">
            <option value="Selecione"></option>
            <option value="Acre">Acre</option>
            <option value="São Paulo">São Paulo</option>
            <option value="Rio de Janeiro">Rio de Janeiro</option>
        </select>

        <button type="button">Salvar</button>
        <br>
    </form>
</body>
</html>
